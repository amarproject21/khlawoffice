          const [iconSvg, setIconSvg] = useState('');

          useEffect(() => {
            if (window.lucide && window.lucide.icons[name]) {
              const svgString = window.lucide.createSvg(window.lucide.icons[name], {
                class: className,
                'stroke-width': 2
              });
              setIconSvg(svgString);
            }
          }, [name, className]);

          return <span dangerouslySetInnerHTML={{ __html: iconSvg }} className="inline-block" />;
        };

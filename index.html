                class: className,
                'stroke-width': 2

                            </div>

                            <p className="text-xs text-slate-400 leading-relaxed pt-2 border-t border-slate-800/80">
                              {attorney.experience}
                            </p>

                            <div className="space-y-1 text-[11px] text-slate-300">
                              <span className="block text-[10px] uppercase text-yellow-500 font-bold">Riwayat Akademis:</span>
                              <ul className="list-disc pl-4 space-y-0.5">
                                {attorney.education.map((edu, idx) => <li key={idx}>{edu}</li>)}
                              </ul>
                            </div>

                            <div className="p-3 bg-[#09111e] rounded border-l-2 border-yellow-500 text-[11px] text-slate-300 italic">
                              "{attorney.cases}"
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* DOKUMENTASI SLIDER BERGULIR OTOMATIS */}
                    <div className="pt-8">
                      <div className="text-center mb-10">
                        <h2 className="text-xs uppercase text-yellow-500 font-bold mb-2 flex items-center justify-center gap-1.5">
                          <Camera className="h-3.5 w-3.5" /> Galeri Kegiatan
                        </h2>
                        <p className="text-2xl font-serif-law font-bold text-white">Dokumentasi KH Law Office</p>
                        <div className="w-12 h-0.5 bg-yellow-500 mx-auto mt-2 rounded-full"></div>
                      </div>

                      <div className="relative w-full overflow-hidden before:absolute before:left-0 before:top-0 before:z-10 before:h-full before:w-20 before:bg-gradient-to-r before:from-[#09111e] before:to-transparent after:absolute after:right-0 after:top-0 after:z-10 after:h-full after:w-20 after:bg-gradient-to-l after:from-[#09111e] after:to-transparent">
                        <div className="animate-scroll gap-6">
                          {DOCUMENTATIONS.map((doc, idx) => (
                            <div key={`doc-1-${idx}`} className="w-[250px] shrink-0 group relative rounded-xl overflow-hidden border border-slate-800 bg-[#0d1a2e]">
                              <img src={doc.url} alt={doc.title} className="w-full h-40 object-cover group-hover:scale-105 transition-transform duration-500" />
                              <div className="p-3 bg-[#0d1a2e]">
                                <p className="text-[11px] font-semibold text-slate-300 line-clamp-1">{doc.title}</p>
                              </div>
                            </div>
                          ))}
                          {DOCUMENTATIONS.map((doc, idx) => (
                            <div key={`doc-2-${idx}`} className="w-[250px] shrink-0 group relative rounded-xl overflow-hidden border border-slate-800 bg-[#0d1a2e]">
                              <img src={doc.url} alt={doc.title} className="w-full h-40 object-cover group-hover:scale-105 transition-transform duration-500" />
                              <div className="p-3 bg-[#0d1a2e]">
                                <p className="text-[11px] font-semibold text-slate-300 line-clamp-1">{doc.title}</p>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* HALAMAN UTAMA LAYANAN KAMI */}
                {activeTab === 'practices' && (
                  <div className="max-w-7xl mx-auto px-4 py-16">
                    <div className="text-center mb-12">
                      <h2 className="text-xs uppercase text-yellow-500 font-bold mb-2">Pilar Kantor Hukum</h2>
                      <p className="text-3xl font-serif-law font-bold text-white">Layanan Kami</p>
                      <div className="w-16 h-1 bg-yellow-500 mx-auto mt-3 rounded-full"></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                      {PRACTICE_AREAS.map(area => (
                        <div key={area.id} className="p-8 bg-[#0d1a2e] rounded-xl border border-slate-800 space-y-4 hover:border-yellow-500/30 transition-all duration-300">
                          <div className="flex items-center space-x-3 mb-2">
                            <div className="p-2.5 bg-yellow-500/10 text-yellow-400 rounded-lg">
                              <LucideIcon name={area.icon} className="h-6 w-6" />
                            </div>
                            <h3 className="text-xl font-bold text-white font-serif-law">{area.title}</h3>
                          </div>
                          <p className="text-xs text-slate-400 leading-relaxed">{area.longDesc}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === 'blog' && (
                  <div className="max-w-7xl mx-auto px-4 py-16 space-y-8">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                      {BLOG_POSTS.map(post => (
                        <article key={post.id} className="bg-[#0d1a2e] p-6 rounded-xl border border-slate-800 flex flex-col justify-between">
                          <div className="space-y-3">
                            <span className="text-[10px] text-yellow-400 uppercase font-bold">{post.category}</span>
                            <h3 className="text-base font-bold text-white hover:text-yellow-400 cursor-pointer line-clamp-2" onClick={() => setReadingBlogPost(post)}>{post.title}</h3>
                            <p className="text-xs text-slate-400 line-clamp-3">{post.summary}</p>
                          </div>
                          <button onClick={() => setReadingBlogPost(post)} className="text-xs text-yellow-500 mt-6 text-left">Baca Selengkapnya →</button>
                        </article>
                      ))}
                    </div>
                  </div>
                )}

                {/* SYSTEM KONSULTASI ONLINE */}
                {activeTab === 'consultation' && (
                  <div className="max-w-4xl mx-auto px-4 py-12">
                    <div className="bg-[#0d1a2e] border border-yellow-500/10 rounded-xl p-6 md:p-10 shadow-xl space-y-8">
                      
                      {/* STEP 1 */}
                      {consultationStep === 1 && (
                        <div className="space-y-6">
                          <h3 className="text-lg font-bold text-white text-center">Langkah 1: Pilih Metode Konsultasi</h3>
                          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div onClick={() => setConsultationData(p => ({ ...p, media: 'chat', price: 150000 }))} className={`p-6 rounded-xl border cursor-pointer ${consultationData.media === 'chat' ? 'border-yellow-500 bg-yellow-500/10' : 'border-slate-800 bg-[#09111e]'}`}>
                              <h4 className="font-bold text-white text-sm">Chat Interaktif</h4>
                              <p className="text-xs text-yellow-400 mt-2">Rp 150.000</p>
                            </div>
                            <div onClick={() => setConsultationData(p => ({ ...p, media: 'video', price: 350000 }))} className={`p-6 rounded-xl border cursor-pointer ${consultationData.media === 'video' ? 'border-yellow-500 bg-yellow-500/10' : 'border-slate-800 bg-[#09111e]'}`}>
                              <h4 className="font-bold text-white text-sm">Video Meeting</h4>
                              <p className="text-xs text-yellow-400 mt-2">Rp 350.000</p>
                            </div>
                            <div onClick={() => setConsultationData(p => ({ ...p, media: 'phone', price: 250000 }))} className={`p-6 rounded-xl border cursor-pointer ${consultationData.media === 'phone' ? 'border-yellow-500 bg-yellow-500/10' : 'border-slate-800 bg-[#09111e]'}`}>
                              <h4 className="font-bold text-white text-sm">Telepon GSM</h4>
                              <p className="text-xs text-yellow-400 mt-2">Rp 250.000</p>
                            </div>
                          </div>
                          <button disabled={!consultationData.media} onClick={() => setConsultationStep(2)} className="w-full py-3 bg-yellow-500 text-slate-950 font-bold rounded-lg disabled:opacity-50">Langkah Selanjutnya</button>
                        </div>
                      )}

                      {/* STEP 2 */}
                      {consultationStep === 2 && (
                        <div className="space-y-4">
                          <h3 className="text-lg font-bold text-white text-center">Langkah 2: Isikan Data Diri & Pilih Jenis Layanan</h3>
                          <input type="text" name="name" placeholder="Nama Lengkap" value={consultationData.name} onChange={handleConsultationFormChange} className="w-full bg-[#09111e] border border-slate-800 rounded-lg p-3 text-xs text-white" />
                          <input type="tel" name="phone" placeholder="Nomor WhatsApp" value={consultationData.phone} onChange={handleConsultationFormChange} className="w-full bg-[#09111e] border border-slate-800 rounded-lg p-3 text-xs text-white" />
                          <input type="email" name="email" placeholder="Email Utama" value={consultationData.email} onChange={handleConsultationFormChange} className="w-full bg-[#09111e] border border-slate-800 rounded-lg p-3 text-xs text-white" />
                          
                          <div className="space-y-1">
                            <label className="text-[11px] font-bold text-slate-300">Pilih Klasifikasi Layanan:</label>
                            <select name="category" value={consultationData.category} onChange={handleConsultationFormChange} className="w-full bg-[#09111e] border border-slate-800 rounded-lg p-3 text-xs text-white">
                              {PRACTICE_AREAS.map(area => (
                                <option key={area.id} value={area.title}>{area.title}</option>
                              ))}
                            </select>
                          </div>

                          <textarea name="description" placeholder="Ceritakan kronologi singkat atau dokumen permohonan hukum yang ingin dikonsultasikan..." value={consultationData.description} onChange={handleConsultationFormChange} className="w-full bg-[#09111e] border border-slate-800 rounded-lg p-3 text-xs text-white" rows="3"></textarea>
                          <div className="flex justify-between">
                            <button onClick={() => setConsultationStep(1)} className="px-4 py-2 border border-slate-700 text-xs text-slate-300 rounded-lg">Kembali</button>
                            <button disabled={!consultationData.name || !consultationData.phone || !consultationData.email || !consultationData.description} onClick={() => setConsultationStep(3)} className="px-6 py-2 bg-yellow-500 text-slate-950 font-bold rounded-lg disabled:opacity-50">Pilih Jadwal</button>
                          </div>
                        </div>
                      )}

                      {/* STEP 3 */}
                      {consultationStep === 3 && (
                        <div className="space-y-6">
                          <h3 className="text-lg font-bold text-white text-center">Langkah 3: Tentukan Tanggal & Jam</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="space-y-2">
                              <label className="text-xs font-bold text-slate-300 flex items-center">
                                <Calendar className="h-4 w-4 mr-1 text-yellow-500" />
                                Pilih Tanggal Tersedia (Juli 2026)
                              </label>
                              <div className="grid grid-cols-4 gap-2">
                                {['2026-07-06', '2026-07-07', '2026-07-08', '2026-07-09', '2026-07-10', '2026-07-13', '2026-07-14', '2026-07-15'].map((dateStr) => {
                                  const dateObj = new Date(dateStr);
                                  const formattedLabel = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
                                  const dayName = dateObj.toLocaleDateString('id-ID', { weekday: 'short' });
                                  return (
                                    <div
                                      key={dateStr}
                                      onClick={() => setConsultationData(p => ({ ...p, selectedDate: dateStr, selectedTimeSlot: '' }))}
                                      className={`p-3 text-center rounded-lg border cursor-pointer transition-all ${
                                        consultationData.selectedDate === dateStr ? 'bg-yellow-500/20 border-yellow-500 text-yellow-300' : 'bg-[#09111e] border-slate-800'
                                      }`}
                                    >
                                      <span className="block text-[9px] text-slate-400 font-bold uppercase">{dayName}</span>
                                      <span className="block text-sm font-bold mt-1">{formattedLabel}</span>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>

                            <div className="space-y-2">
                              <label className="text-xs font-bold text-slate-300 flex items-center">
                                <Clock className="h-4 w-4 mr-1 text-yellow-500" />
                                Pilih Slot Jam
                              </label>
                              {consultationData.selectedDate ? (
                                <div className="grid grid-cols-2 gap-2">
                                  {['09:00 - 10:00', '10:30 - 11:30', '13:30 - 14:30', '15:00 - 16:00'].map((slot) => (
                                    <div
                                      key={slot}
                                      onClick={() => setConsultationData(p => ({ ...p, selectedTimeSlot: slot }))}
                                      className={`p-3 text-center text-xs font-semibold rounded-lg border cursor-pointer transition-all ${
                                        consultationData.selectedTimeSlot === slot ? 'bg-yellow-500/20 border-yellow-500 text-yellow-300' : 'bg-[#09111e] border-slate-800'
                                      }`}
                                    >
                                      {slot}
                                    </div>
                                  ))}
                                </div>
                              ) : (
                                <div className="h-32 bg-[#09111e] border border-slate-800 rounded-lg flex items-center justify-center p-4">
                                  <p className="text-xs text-slate-500 text-center">Silakan pilih tanggal terlebih dahulu.</p>
                                </div>
                              )}
                            </div>
                          </div>
                          <div className="flex justify-between pt-4">
                            <button onClick={() => setConsultationStep(2)} className="px-4 py-2 border border-slate-700 text-slate-300 rounded-lg text-xs font-bold">Kembali</button>
                            <button disabled={!consultationData.selectedDate || !consultationData.selectedTimeSlot} onClick={() => setConsultationStep(4)} className={`px-6 py-3 rounded-lg text-xs font-bold flex items-center ${consultationData.selectedDate && consultationData.selectedTimeSlot ? 'bg-gradient-to-r from-yellow-500 to-yellow-600 text-slate-950' : 'bg-slate-800 text-slate-500'}`}>
                              Lanjutkan Pembayaran <ChevronRight className="h-4 w-4 ml-1" />
                            </button>
                          </div>
                        </div>
                      )}

                      {/* STEP 4 */}
                      {consultationStep === 4 && (
                        <div className="space-y-6 animate-fadeIn">
                          <div className="text-center">
                            <h3 className="text-lg font-bold text-white">Langkah 4: Selesaikan Pembayaran Konsultasi</h3>
                          </div>
                          <div className="p-5 bg-[#09111e] border border-slate-800 rounded-xl space-y-4">
                            <h4 className="text-xs font-bold text-yellow-500 uppercase tracking-wider">Ringkasan Invoice Pendaftaran</h4>
                            <div className="space-y-2 text-xs text-slate-300">
                              <div className="flex justify-between">
                                <span>Pemohon</span>
                                <span className="font-semibold text-white">{consultationData.name}</span>
                              </div>
                              <div className="flex justify-between">
                                <span>Klasifikasi Layanan</span>
                                <span className="font-semibold text-white">{consultationData.category}</span>
                              </div>
                              <div className="flex justify-between">
                                <span>Media Sesi</span>
                                <span className="font-semibold text-white capitalize">{consultationData.media} Call</span>
                              </div>
                              <div className="h-px bg-slate-800 my-2"></div>
                              <div className="flex justify-between text-sm font-bold text-white">
                                <span>Total Biaya</span>
                                <span className="text-yellow-400">Rp {consultationData.price.toLocaleString('id-ID')}</span>
                              </div>
                            </div>
                          </div>

                          {isProcessingPayment ? (
                            <div className="py-12 flex flex-col items-center justify-center space-y-4">
                              <div className="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-yellow-500"></div>
                              <p className="text-xs text-slate-400">Memproses verifikasi dana aman otomatis...</p>
                            </div>
                          ) : (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                              <div onClick={() => startPaymentSimulation('va')} className="p-4 bg-[#09111e] border border-slate-800 hover:border-yellow-500/40 rounded-lg cursor-pointer text-center text-xs font-bold">Virtual Account</div>
                              <div onClick={() => startPaymentSimulation('qris')} className="p-4 bg-[#09111e] border border-slate-800 hover:border-yellow-500/40 rounded-lg cursor-pointer text-center text-xs font-bold">QRIS Instan</div>
                              <div onClick={() => startPaymentSimulation('cc')} className="p-4 bg-[#09111e] border border-slate-800 hover:border-yellow-500/40 rounded-lg cursor-pointer text-center text-xs font-bold">Kartu Kredit</div>
                            </div>
                          )}
                        </div>
                      )}

                      {/* STEP 5 */}
                      {consultationStep === 5 && (
                        <div className="space-y-4 text-center">
                          <div className="text-emerald-400 font-bold text-xl">✓ Pemesanan Berhasil Terjadwal!</div>
                          <p className="text-xs text-slate-400">Kode Booking Anda: KH-LAW-{Math.floor(1000 + Math.random() * 9000)}</p>
                          <button onClick={() => setActiveTab('home')} className="mt-4 px-6 py-2.5 bg-slate-800 text-xs font-bold rounded-lg">Kembali ke Beranda</button>
                        </div>
                      )}

                    </div>
                  </div>
                )}
              </main>

              {/* FOOTER */}
              <footer className="bg-[#050b14] border-t border-yellow-600/10 py-12 text-center text-xs text-slate-500 space-y-3">
                <div className="flex justify-center items-center space-x-2 text-slate-300 font-bold font-serif-law">
                  <Scale className="h-4 w-4 text-yellow-500" />
                  <span>KH LAW OFFICE</span>
                </div>
                <p className="italic text-[10px] tracking-wider text-yellow-600/70">"Salus Populi Suprema Lex Esto"</p>
                <p className="pt-4 border-t border-slate-900/50 max-w-7xl mx-auto">© 2026 KH LAW OFFICE. Seluruh hak cipta dilindungi.</p>
              </footer>
            </div>
          );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>

            if (window.lucide && window.lucide.icons[name]) {
              const svgString = window.lucide.createSvg(window.lucide.icons[name], {
                class: className,
                'stroke-width': 2
              });
              setIconSvg(svgString);
            }

          return <span dangerouslySetInnerHTML={{ __html: iconSvg }} className="inline-block" />;

                            <p className="text-xs text-slate-400 leading-relaxed">Tidak ada biaya tersembunyi. Update laporan kasus berkala yang transparan.</p>
                          </div>
                        </div>
                      </div>
                    </section>
                  </div>
                )}

                {activeTab === 'about' && (
                  <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-16 space-y-12 sm:space-y-16">
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 sm:gap-12 items-center">
                      <div className="space-y-4 sm:space-y-6 text-center lg:text-left">
                        <h1 className="text-3xl sm:text-4xl font-serif-law font-bold text-white">KH LAW OFFICE</h1>
                        <p className="text-xs text-yellow-500 uppercase tracking-widest font-semibold italic">Salus Populi Suprema Lex Esto</p>
                        <p className="text-xs sm:text-sm text-slate-300 leading-relaxed">Didirikan pada tahun 2023, KH LAW OFFICE telah tumbuh menjadi firma hukum tepercaya yang berdedikasi tinggi menegakkan hak-hak legal para klien dengan pendekatan modern, solutif, dan penuh integritas.</p>
                      </div>
                      <div className="w-full max-w-md mx-auto lg:max-w-none">
                        <img src="https://images.unsplash.com/photo-1453728148627-496b818a1a2b?auto=format&fit=crop&q=80&w=1000" className="rounded-xl border border-yellow-500/20 shadow-2xl w-full object-cover h-64 sm:h-80" />
                      </div>
                    </div>

                    {/* HALAMAN ADVOKAT */}
                    <div className="max-w-md mx-auto px-2">
                      <div className="text-center mb-8 sm:mb-10">
                        <h2 className="text-xs uppercase text-yellow-500 font-bold tracking-wider mb-2">Para Ahli Hukum Kami</h2>
                        <p className="text-xl sm:text-2xl font-serif-law font-bold text-white">Kenali Tim Advokat & Partner</p>
                        <div className="w-12 h-0.5 bg-yellow-500 mx-auto mt-2 rounded-full"></div>
                      </div>

                      {ATTORNEYS.map(attorney => (
                        <div key={attorney.id} className="bg-[#0d1a2e] border border-slate-800 rounded-xl overflow-hidden shadow-xl hover:border-yellow-500/30 transition-all duration-300">
                          <img src={attorney.image} className="w-full h-72 sm:h-80 object-cover object-top" />
                          <div className="p-5 sm:p-6 space-y-4">
                            <div>
                              <h3 className="text-lg sm:text-xl font-bold text-white font-serif-law">{attorney.name}</h3>
                              <p className="text-xs text-yellow-400 font-medium mt-0.5">{attorney.role}</p>
                            </div>
                            
                            <div className="flex flex-wrap gap-1.5 pt-1">
                              {attorney.specialties.map((spec, index) => (
                                <span key={index} className="px-2 py-0.5 bg-slate-800 text-[10px] text-slate-300 rounded">
                                  {spec}
                                </span>
                              ))}
                            </div>

                            <p className="text-xs text-slate-400 leading-relaxed pt-2 border-t border-slate-800/80">
                              {attorney.experience}
                            </p>

                            <div className="space-y-1 text-[11px] text-slate-300">
                              <span className="block text-[10px] uppercase text-yellow-500 font-bold tracking-wider">Riwayat Akademis:</span>
                              <ul className="list-disc pl-4 space-y-0.5">
                                {attorney.education.map((edu, idx) => <li key={idx}>{edu}</li>)}
                              </ul>
                            </div>

                            <div className="p-3 bg-[#09111e] rounded border-l-2 border-yellow-500 text-[11px] text-slate-300 italic leading-relaxed">
                              "{attorney.cases}"
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* DOKUMENTASI SLIDER */}
                    <div className="pt-6 sm:pt-8">
                      <div className="text-center mb-8">
                        <h2 className="text-xs uppercase text-yellow-500 font-bold mb-2 flex items-center justify-center gap-1.5 tracking-wider">
                          <Camera className="h-3.5 w-3.5" /> Galeri Kegiatan
                        </h2>
                        <p className="text-xl sm:text-2xl font-serif-law font-bold text-white">Dokumentasi KH Law Office</p>
                        <div className="w-12 h-0.5 bg-yellow-500 mx-auto mt-2 rounded-full"></div>
                      </div>

                      <div className="relative w-full overflow-hidden before:absolute before:left-0 before:top-0 before:z-10 before:h-full before:w-12 sm:before:w-20 before:bg-gradient-to-r before:from-[#09111e] before:to-transparent after:absolute after:right-0 after:top-0 after:z-10 after:h-full after:w-12 sm:after:w-20 after:bg-gradient-to-l after:from-[#09111e] after:to-transparent">
                        <div className="animate-scroll gap-4 sm:gap-6">
                          {DOCUMENTATIONS.map((doc, idx) => (
                            <div key={`doc-1-${idx}`} className="w-[220px] sm:w-[250px] shrink-0 group relative rounded-xl overflow-hidden border border-slate-800 bg-[#0d1a2e]">
                              <img src={doc.url} alt={doc.title} className="w-full h-36 sm:h-40 object-cover group-hover:scale-105 transition-transform duration-500" />
                              <div className="p-3 bg-[#0d1a2e]">
                                <p className="text-[11px] font-semibold text-slate-300 line-clamp-1">{doc.title}</p>
                              </div>
                            </div>
                          ))}
                          {DOCUMENTATIONS.map((doc, idx) => (
                            <div key={`doc-2-${idx}`} className="w-[220px] sm:w-[250px] shrink-0 group relative rounded-xl overflow-hidden border border-slate-800 bg-[#0d1a2e]">
                              <img src={doc.url} alt={doc.title} className="w-full h-36 sm:h-40 object-cover group-hover:scale-105 transition-transform duration-500" />
                              <div className="p-3 bg-[#0d1a2e]">
                                <p className="text-[11px] font-semibold text-slate-300 line-clamp-1">{doc.title}</p>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* AREA LAYANAN */}
                {activeTab === 'practices' && (
                  <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-16">
                    <div className="text-center mb-10 sm:mb-12">
                      <h2 className="text-xs uppercase text-yellow-500 font-bold tracking-widest mb-2">Pilar Kantor Hukum</h2>
                      <p className="text-2xl sm:text-3xl font-serif-law font-bold text-white">Layanan Kami</p>
                      <div className="w-16 h-1 bg-yellow-500 mx-auto mt-3 rounded-full"></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8">
                      {PRACTICE_AREAS.map(area => (
                        <div key={area.id} className="p-5 sm:p-8 bg-[#0d1a2e] rounded-xl border border-slate-800 space-y-3 sm:space-y-4 hover:border-yellow-500/30 transition-all duration-300 shadow-lg">
                          <div className="flex items-start sm:items-center space-x-3">
                            <div className="p-2.5 bg-yellow-500/10 text-yellow-400 rounded-lg shrink-0">
                              <LucideIcon name={area.icon} className="h-5 w-5 sm:h-6 sm:w-6" />
                            </div>
                            <h3 className="text-lg sm:text-xl font-bold text-white font-serif-law leading-tight">{area.title}</h3>
                          </div>
                          <p className="text-xs text-slate-400 leading-relaxed pl-1">{area.longDesc}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* EDUKASI HUKUM / BLOG */}
                {activeTab === 'blog' && (
                  <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-16">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                      {BLOG_POSTS.map(post => (
                        <article key={post.id} className="bg-[#0d1a2e] p-6 rounded-xl border border-slate-800 flex flex-col justify-between h-full shadow-lg">
                          <div className="space-y-3">
                            <span className="text-[10px] text-yellow-400 uppercase font-bold tracking-wider">{post.category}</span>
                            <h3 className="text-base sm:text-lg font-bold text-white hover:text-yellow-400 cursor-pointer transition-colors duration-200 line-clamp-2" onClick={() => setReadingBlogPost(post)}>{post.title}</h3>
                            <p className="text-xs text-slate-400 leading-relaxed line-clamp-3">{post.summary}</p>
                          </div>
                          <button onClick={() => setReadingBlogPost(post)} className="text-xs text-yellow-500 font-semibold mt-6 text-left hover:text-yellow-400 transition-colors duration-200 inline-flex items-center">
                            Baca Selengkapnya <ChevronRight className="h-3.5 w-3.5 ml-0.5" />
                          </button>
                        </article>
                      ))}
                    </div>
                  </div>
                )}

                {/* SYSTEM KONSULTASI ONLINE */}
                {activeTab === 'consultation' && (
                  <div className="max-w-4xl mx-auto px-4 py-8 sm:py-12">
                    <div className="bg-[#0d1a2e] border border-yellow-500/10 rounded-xl p-5 sm:p-8 md:p-10 shadow-xl space-y-6 sm:space-y-8">
                      
                      {/* STEP 1 */}
                      {consultationStep === 1 && (
                        <div className="space-y-5 sm:space-y-6">
                          <h3 className="text-base sm:text-lg font-bold text-white text-center">Langkah 1: Pilih Metode Konsultasi</h3>
                          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 sm:gap-4">
                            <div onClick={() => setConsultationData(p => ({ ...p, media: 'chat', price: 150000 }))} className={`p-5 sm:p-6 rounded-xl border cursor-pointer transition-all ${consultationData.media === 'chat' ? 'border-yellow-500 bg-yellow-500/10 shadow-lg' : 'border-slate-800 bg-[#09111e] hover:border-slate-700'}`}>
                              <h4 className="font-bold text-white text-sm">Chat Interaktif</h4>
                              <p className="text-xs text-yellow-400 mt-2 font-semibold">Rp 150.000</p>
                            </div>
                            <div onClick={() => setConsultationData(p => ({ ...p, media: 'video', price: 350000 }))} className={`p-5 sm:p-6 rounded-xl border cursor-pointer transition-all ${consultationData.media === 'video' ? 'border-yellow-500 bg-yellow-500/10 shadow-lg' : 'border-slate-800 bg-[#09111e] hover:border-slate-700'}`}>
                              <h4 className="font-bold text-white text-sm">Video Meeting</h4>
                              <p className="text-xs text-yellow-400 mt-2 font-semibold">Rp 350.000</p>
                            </div>
                            <div onClick={() => setConsultationData(p => ({ ...p, media: 'phone', price: 250000 }))} className={`p-5 sm:p-6 rounded-xl border cursor-pointer transition-all ${consultationData.media === 'phone' ? 'border-yellow-500 bg-yellow-500/10 shadow-lg' : 'border-slate-800 bg-[#09111e] hover:border-slate-700'}`}>
                              <h4 className="font-bold text-white text-sm">Telepon GSM</h4>
                              <p className="text-xs text-yellow-400 mt-2 font-semibold">Rp 250.000</p>
                            </div>
                          </div>
                          <button disabled={!consultationData.media} onClick={() => setConsultationStep(2)} className="w-full py-3 sm:py-3.5 bg-yellow-500 text-slate-950 font-bold rounded-lg disabled:opacity-50 transition-opacity duration-200 active:scale-[0.99]">Langkah Selanjutnya</button>
                        </div>
                      )}

                      {/* STEP 2 */}
                      {consultationStep === 2 && (
                        <div className="space-y-4">
                          <h3 className="text-base sm:text-lg font-bold text-white text-center">Langkah 2: Isikan Data Diri & Pilih Jenis Layanan</h3>
                          <input type="text" name="name" placeholder="Nama Lengkap" value={consultationData.name} onChange={handleConsultationFormChange} className="w-full bg-[#09111e] border border-slate-800 rounded-lg p-3 text-xs text-white focus:border-yellow-500 focus:outline-none" />
                          <input type="tel" name="phone" placeholder="Nomor WhatsApp" value={consultationData.phone} onChange={handleConsultationFormChange} className="w-full bg-[#09111e] border border-slate-800 rounded-lg p-3 text-xs text-white focus:border-yellow-500 focus:outline-none" />
                          <input type="email" name="email" placeholder="Email Utama" value={consultationData.email} onChange={handleConsultationFormChange} className="w-full bg-[#09111e] border border-slate-800 rounded-lg p-3 text-xs text-white focus:border-yellow-500 focus:outline-none" />
                          
                          <div className="space-y-1">
                            <label className="text-[11px] font-bold text-slate-300">Pilih Klasifikasi Layanan:</label>
                            <select name="category" value={consultationData.category} onChange={handleConsultationFormChange} className="w-full bg-[#09111e] border border-slate-800 rounded-lg p-3 text-xs text-white focus:border-yellow-500 focus:outline-none">
                              {PRACTICE_AREAS.map(area => (
                                <option key={area.id} value={area.title}>{area.title}</option>
                              ))}
                            </select>
                          </div>

                          <textarea name="description" placeholder="Ceritakan kronologi singkat atau dokumen permohonan hukum yang ingin dikonsultasikan..." value={consultationData.description} onChange={handleConsultationFormChange} className="w-full bg-[#09111e] border border-slate-800 rounded-lg p-3 text-xs text-white focus:border-yellow-500 focus:outline-none" rows="4"></textarea>
                          <div className="flex justify-between items-center pt-2">
                            <button onClick={() => setConsultationStep(1)} className="px-4 py-2 border border-slate-700 text-xs text-slate-300 rounded-lg hover:bg-white/5 transition-colors">Kembali</button>
                            <button disabled={!consultationData.name || !consultationData.phone || !consultationData.email || !consultationData.description} onClick={() => setConsultationStep(3)} className="px-5 py-2 sm:px-6 sm:py-2.5 bg-yellow-500 text-slate-950 font-bold rounded-lg disabled:opacity-50 active:scale-95">Pilih Jadwal</button>
                          </div>
                        </div>
                      )}

                      {/* STEP 3 */}
                      {consultationStep === 3 && (
                        <div className="space-y-6">
                          <h3 className="text-base sm:text-lg font-bold text-white text-center">Langkah 3: Tentukan Tanggal & Jam</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="space-y-2">
                              <label className="text-xs font-bold text-slate-300 flex items-center">
                                <Calendar className="h-4 w-4 mr-1 text-yellow-500" />
                                Pilih Tanggal Tersedia (Juli 2026)
                              </label>
                              <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
                                {['2026-07-06', '2026-07-07', '2026-07-08', '2026-07-09', '2026-07-10', '2026-07-13', '2026-07-14', '2026-07-15'].map((dateStr) => {
                                  const dateObj = new Date(dateStr);
                                  const formattedLabel = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
                                  const dayName = dateObj.toLocaleDateString('id-ID', { weekday: 'short' });
                                  return (
                                    <div
                                      key={dateStr}
                                      onClick={() => setConsultationData(p => ({ ...p, selectedDate: dateStr, selectedTimeSlot: '' }))}
                                      className={`p-2.5 text-center rounded-lg border cursor-pointer transition-all ${
                                        consultationData.selectedDate === dateStr ? 'bg-yellow-500/20 border-yellow-500 text-yellow-300 font-semibold' : 'bg-[#09111e] border-slate-800 hover:border-slate-700'
                                      }`}
                                    >
                                      <span className="block text-[8px] text-slate-400 font-bold uppercase">{dayName}</span>
                                      <span className="block text-xs font-bold mt-0.5">{formattedLabel}</span>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>

                            <div className="space-y-2">
                              <label className="text-xs font-bold text-slate-300 flex items-center">
                                <Clock className="h-4 w-4 mr-1 text-yellow-500" />
                                Pilih Slot Jam
                              </label>
                              {consultationData.selectedDate ? (
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                  {['09:00 - 10:00', '10:30 - 11:30', '13:30 - 14:30', '15:00 - 16:00'].map((slot) => (
                                    <div
                                      key={slot}
                                      onClick={() => setConsultationData(p => ({ ...p, selectedTimeSlot: slot }))}
                                      className={`p-3 text-center text-xs font-semibold rounded-lg border cursor-pointer transition-all ${
                                        consultationData.selectedTimeSlot === slot ? 'bg-yellow-500/20 border-yellow-500 text-yellow-300' : 'bg-[#09111e] border-slate-800 hover:border-slate-700'
                                      }`}
                                    >
                                      {slot}
                                    </div>
                                  ))}
                                </div>
                              ) : (
                                <div className="h-32 bg-[#09111e] border border-slate-800 rounded-lg flex items-center justify-center p-4">
                                  <p className="text-xs text-slate-500 text-center">Silakan pilih tanggal terlebih dahulu.</p>
                                </div>
                              )}
                            </div>
                          </div>
                          <div className="flex justify-between items-center pt-4 border-t border-slate-800/80">
                            <button onClick={() => setConsultationStep(2)} className="px-4 py-2 border border-slate-700 text-slate-300 rounded-lg text-xs font-bold hover:bg-white/5">Kembali</button>
                            <button disabled={!consultationData.selectedDate || !consultationData.selectedTimeSlot} onClick={() => setConsultationStep(4)} className={`px-5 py-2.5 sm:px-6 sm:py-3 rounded-lg text-xs font-bold flex items-center transition-transform active:scale-95 ${consultationData.selectedDate && consultationData.selectedTimeSlot ? 'bg-gradient-to-r from-yellow-500 to-yellow-600 text-slate-950 shadow-md' : 'bg-slate-800 text-slate-500'}`}>
                              Lanjutkan Pembayaran <ChevronRight className="h-4 w-4 ml-1" />
                            </button>
                          </div>
                        </div>
                      )}

                      {/* STEP 4 */}
                      {consultationStep === 4 && (
                        <div className="space-y-6">
                          <div className="text-center">
                            <h3 className="text-base sm:text-lg font-bold text-white">Langkah 4: Selesaikan Pembayaran Konsultasi</h3>
                          </div>
                          <div className="p-4 sm:p-5 bg-[#09111e] border border-slate-800 rounded-xl space-y-4 shadow-inner">
                            <h4 className="text-xs font-bold text-yellow-500 uppercase tracking-wider">Ringkasan Invoice Pendaftaran</h4>
                            <div className="space-y-2.5 text-xs text-slate-300">
                              <div className="flex justify-between gap-4">
                                <span className="text-slate-400">Pemohon</span>
                                <span className="font-semibold text-white text-right">{consultationData.name}</span>
                              </div>
                              <div className="flex justify-between gap-4">
                                <span className="text-slate-400">Klasifikasi Layanan</span>
                                <span className="font-semibold text-white text-right">{consultationData.category}</span>
                              </div>
                              <div className="flex justify-between gap-4">
                                <span className="text-slate-400">Media Sesi</span>
                                <span className="font-semibold text-white capitalize">{consultationData.media} Call</span>
                              </div>
                              <div className="h-px bg-slate-800 my-2"></div>
                              <div className="flex justify-between text-sm font-bold text-white">
                                <span>Total Biaya</span>
                                <span className="text-yellow-400">Rp {consultationData.price.toLocaleString('id-ID')}</span>
                              </div>
                            </div>
                          </div>

                          {isProcessingPayment ? (
                            <div className="py-10 flex flex-col items-center justify-center space-y-4">
                              <div className="animate-spin rounded-full h-9 w-9 border-t-2 border-b-2 border-yellow-500"></div>
                              <p className="text-xs text-slate-400">Memproses verifikasi dana aman otomatis...</p>
                            </div>
                          ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-2.5">
                              <div onClick={() => startPaymentSimulation('va')} className="p-3.5 bg-[#09111e] border border-slate-800 hover:border-yellow-500/40 rounded-lg cursor-pointer text-center text-xs font-bold text-slate-200 transition-all">Virtual Account</div>
                              <div onClick={() => startPaymentSimulation('qris')} className="p-3.5 bg-[#09111e] border border-slate-800 hover:border-yellow-500/40 rounded-lg cursor-pointer text-center text-xs font-bold text-slate-200 transition-all">QRIS Instan</div>
                              <div onClick={() => startPaymentSimulation('cc')} className="p-3.5 bg-[#09111e] border border-slate-800 hover:border-yellow-500/40 rounded-lg cursor-pointer text-center text-xs font-bold text-slate-200 transition-all">Kartu Kredit</div>
                            </div>
                          )}
                        </div>
                      )}

                      {/* STEP 5 */}
                      {consultationStep === 5 && (
                        <div className="space-y-4 text-center py-6">
                          <div className="text-emerald-400 font-bold text-lg sm:text-xl flex items-center justify-center gap-2">
                            <CheckCircle2 className="h-6 w-6" /> ✓ Pemesanan Berhasil Terjadwal!
                          </div>
                          <p className="text-xs text-slate-400">Kode Booking Anda: <span className="text-yellow-500 font-mono font-bold">KH-LAW-{Math.floor(1000 + Math.random() * 9000)}</span></p>
                          <p className="text-xs text-slate-300 max-w-sm mx-auto leading-relaxed">Detail dan tautan ruang konsultasi online telah dikirimkan ke email dan nomor WhatsApp Anda.</p>
                          <button onClick={() => setActiveTab('home')} className="mt-4 px-6 py-2.5 bg-slate-800 text-xs font-bold rounded-lg hover:bg-slate-700 transition-colors">Kembali ke Beranda</button>
                        </div>
                      )}

                    </div>
                  </div>
                )}
              </main>

              {/* FOOTER */}
              <footer className="bg-[#050b14] border-t border-yellow-600/10 py-10 px-4 text-center text-xs text-slate-500 space-y-3">
                <div className="flex justify-center items-center space-x-2 text-slate-300 font-bold font-serif-law text-sm">
                  <Scale className="h-4 w-4 text-yellow-500" />
                  <span>KH LAW OFFICE</span>
                </div>
                <p className="italic text-[10px] tracking-wider text-yellow-600/70">"Salus Populi Suprema Lex Esto"</p>
                <p className="pt-4 border-t border-slate-900/50 max-w-7xl mx-auto text-[11px]">© 2026 KH LAW OFFICE. Seluruh hak cipta dilindungi.</p>
              </footer>
            </div>
          );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
